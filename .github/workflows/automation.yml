name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    timeout-minutes: 15
    # Start a fresh Linux virtual machine (Ubuntu) to run the code
    runs-on: ubuntu-latest

    steps:
    # Copy your code from GitHub to the virtual machine
    - name: Checkout code
      uses: actions/checkout@v5

    # Get the Python version from the '.python-version' file
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version-file: '.python-version'

    # Update 'pip' and install your libraries (Playwright, Pytest)
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Download the actual browsers (Chrome, Firefox)
    - name: Install Playwright Browsers
      run: python -m playwright install --with-deps

    # Run the tests and record video if they fail
    - name: Run Pytest
      run: pytest --tracing=retain-on-failure

    # Save the test results (video/photos) to GitHub if there is a failure
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-traces
        path: test-results/