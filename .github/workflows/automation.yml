name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    timeout-minutes: 15
    # Start a fresh Linux virtual machine (Ubuntu) to run the code
    runs-on: ubuntu-latest

    # Connect to GitHub Environments to access variables and secrets 
    environment: ${{ github.ref_name == 'main' && 'prod' || 'prod' }}

    env:
      ENVIRONMENT: ${{ github.ref_name == 'main' && 'prod' || 'prod' }}

    steps:
    # Copy your code from GitHub to the virtual machine
    - name: Checkout code
      uses: actions/checkout@v5

    # Build the .env file from GitHub variables and secrets
    - name: Create env file
      run: |
        echo "BASE_URL=${{ vars.BASE_URL }}" > .env.${{ env.ENVIRONMENT }}

    # Get the Python version from the '.python-version' file
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version-file: '.python-version'
        cache: 'pip'

    # Update 'pip' and install your libraries (Playwright, Pytest)
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Cache browsers to speed up execution  
    - name: Cache Playwright browsers
      uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}

    # Install the browsers (Chrome/Firefox)
    - name: Install Playwright Browsers
      run: python -m playwright install --with-deps

    # Run tests and create the HTML report
    - name: Run tests
      run: pytest tests/ --tracing=retain-on-failure --html=report.html --self-contained-html

    # Save the HTML report to GitHub for 7 days
    - name: Upload HTML Report
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v6
      with:
        name: test-report
        path: report.html
        retention-days: 7
        if-no-files-found: ignore

    # Save the test results (video/photos) to GitHub for 7 days if there is a failure
    - name: Upload Test Results
      uses: actions/upload-artifact@v6
      if: failure()
      with:
        name: playwright-traces
        path: test-results/
        retention-days: 7
        if-no-files-found: ignore
